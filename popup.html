<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Video Helper</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 300px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .shell {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 28px rgba(15,23,42,.12);
    }
    h1 { margin: 0 0 4px; font-size: 21px; font-weight: 850; }
    .tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid #fb923c;
      background: #fff7ed;
      color: #c2410c;
      font-size: 12px;
      font-weight: 850;
    }
    p { margin: 0 0 12px; font-size: 13px; line-height: 1.5; color: #4b5563; }
    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px 11px;
      border: 1px solid #1d4ed8;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button.secondary {
      border-color: #9ca3af;
      background: #ffffff;
      color: #111827;
    }
    button.secondary:hover { background: #f3f4f6; }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      background: #e5e7eb !important;
      border-color: #d1d5db !important;
      color: #6b7280 !important;
    }
    .message {
      display: none;
      margin-top: 10px;
      padding: 9px 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #374151;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Video Helper</h1>
    <div class="tag">2.3.3</div>
    <p>Choose what to open.</p>

    <button id="openConfig">Open Configuration</button>
    <button id="openStatus" class="secondary">Open Status Panel</button>
    <button id="thirdOption" class="secondary" disabled>Coming Soon</button>

    <div id="message" class="message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
